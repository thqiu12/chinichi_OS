# Single-VM deploy stack: web + postgres + nginx
# Suitable for阿里云 轻量应用服务器 / ECS single-instance.
#
# Bring up:  docker compose up -d --build
# Migrate:   docker compose exec web npx prisma migrate deploy
# Seed:      docker compose exec web npm run db:seed
# Logs:      docker compose logs -f web
# Stop:      docker compose down
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chinichi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: chinichi
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chinichi -d chinichi"]
      interval: 5s
      timeout: 3s
      retries: 12
    # No port exposed to host by default — only the web service can reach it.

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://chinichi:${POSTGRES_PASSWORD}@db:5432/chinichi
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?set NEXTAUTH_SECRET in .env}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      WECOM_CORP_ID: ${WECOM_CORP_ID:-}
      WECOM_SECRET: ${WECOM_SECRET:-}
      WECOM_AGENT_ID: ${WECOM_AGENT_ID:-}
      CRON_SECRET: ${CRON_SECRET:?set CRON_SECRET in .env}
    # Bind only to loopback — Nginx (or阿里云 SLB) is the public face.
    ports:
      - "127.0.0.1:3000:3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [web]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro     # mount your阿里云 SSL证书 here

volumes:
  pgdata:
