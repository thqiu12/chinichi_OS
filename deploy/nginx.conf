# Reverse proxy to Next.js (web:3000). Mount as
# /etc/nginx/conf.d/default.conf in the nginx container.
#
# HTTPS:  put阿里云 SSL证书 fullchain.pem / private.key into deploy/certs/
#         and uncomment the 443 block + listen-on-443 hint below.

# Optional: rate-limit auth & import endpoints
limit_req_zone $binary_remote_addr zone=auth:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=import:10m rate=10r/m;

upstream chinichi_web {
  server web:3000;
  keepalive 32;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 20m;       # batch import xlsx can be ~5-10MB

  # Forwarded headers so Next.js sees the real client
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_http_version 1.1;
  proxy_set_header Connection        "";

  # Static assets — Next emits content-hashed names; cache aggressively
  location /_next/static/ {
    proxy_pass http://chinichi_web;
    proxy_cache_valid 200 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Rate-limit sensitive endpoints
  location /api/auth/                { limit_req zone=auth   burst=10 nodelay; proxy_pass http://chinichi_web; }
  location /api/leads/import         { limit_req zone=import burst=2  nodelay; proxy_pass http://chinichi_web; }

  location / {
    proxy_pass http://chinichi_web;
  }
}

